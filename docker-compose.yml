version: "3.9"

services:
  research-rag:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./papers:/app/papers
      - ./vectorstore:/app/vectorstore
      - hf-cache:/root/.cache/huggingface   # ← cache HF model so it doesn't re-download every restart
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HF_HUB_DISABLE_SYMLINKS_WARNING=1   # ← suppresses the symlinks warning you saw
    restart: unless-stopped

volumes:
  hf-cache: